<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUSKI COSMETICS</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background-color: #f4f4f4; color: #333; text-align: center; }
        header { padding: 30px 10px; background: #fff; }
        h1 { margin: 0; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; }
        .sub-logo { font-size: 14px; color: #888; margin-bottom: 20px; }
        
        /* Кнопки как на фото */
        .btn-scan { background: #343a40; color: white; padding: 12px 35px; border-radius: 50px; border: none; font-size: 16px; cursor: pointer; margin-bottom: 20px; }
        .category-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; padding: 0 10px; }
        .btn-cat { background: #fff; border: 1px solid #ddd; padding: 8px 20px; border-radius: 50px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-cat.active { background: #343a40; color: #fff; border-color: #343a40; }

        /* Сетка товаров */
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: left; }
        .card img { width: 100%; border-radius: 10px; cursor: zoom-in; transition: transform 0.2s; }
        .card img:hover { transform: scale(1.02); }
        .card h3 { font-size: 15px; margin: 10px 0 5px; height: 35px; overflow: hidden; }
        .card .price { color: #b02a37; font-weight: bold; font-size: 18px; margin: 5px 0; }
        .card .pro-label { background: #333; color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 5px; display: inline-block; }

        /* Модальное окно (Увеличение фото) */
        #imgModal { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; cursor: pointer; }
        #imgModal img { max-width: 90%; max-height: 85%; border-radius: 5px; }

        /* Сканер с крестиком */
        #scanner-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #close-x { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 10001; }
    </style>
</head>
<body>

<header>
    <h1>TUSKI COSMETICS</h1>
    <div class="sub-logo">MARNEULI SMART CATALOG</div>
    <button class="btn-scan" onclick="startScanner()">ჩართე სკანერი (Start Scan)</button>
    
    <div class="category-container" id="category-box">
        <button class="btn-cat active" onclick="filter('All')">ყველა (All)</button>
        </div>
</header>

<div id="catalog">იტვირთება... (Loading...)</div>

<div id="scanner-layer">
    <button id="close-x" onclick="stopScanner()">✕</button>
    <div id="reader"></div>
</div>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="fullImg" src="">
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    // ЗАМЕНИ НА СВОЮ ССЫЛКУ CSV
    const url = 'ССЫЛКА_НА_ТВОЙ_CSV_ФАЙЛ_ТУТ';
    let products = [];

    async function fetchData() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            products = rows.map(r => {
                const c = r.split(',');
                return { name: c[0], cat: c[1], price: c[2], img: c[3], code: c[4] };
            });
            createCategories();
            render(products);
        } catch (e) { document.getElementById('catalog').innerHTML = "შეცდომაა (Error)"; }
    }

    function createCategories() {
        const cats = ['All', ...new Set(products.map(p => p.cat))];
        const box = document.getElementById('category-box');
        box.innerHTML = cats.map(c => `<button class="btn-cat ${c==='All'?'active':''}" onclick="filter('${c}', this)">${translate(c)}</button>`).join('');
    }

    function translate(c) {
        if(c === 'perfume') return 'პარფიუმერია';
        if(c === 'lipstick') return 'ტუჩსაცხი';
        if(c === 'salon') return 'სალონი (Pro)';
        return c;
    }

    function render(data) {
        const container = document.getElementById('catalog');
        container.innerHTML = data.map(p => `
            <div class="card">
                <img src="${p.img}" onclick="zoom('${p.img}')">
                <h3>${p.name}</h3>
                <div class="price">${p.price} GEL</div>
                <div class="pro-label">მხოლოდ სალონებისთვის (Pro Only)</div>
            </div>
        `).join('');
    }

    function filter(cat, btn) {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        const filtered = (cat === 'All') ? products : products.filter(p => p.cat === cat);
        render(filtered);
    }

    function zoom(src) {
        document.getElementById('fullImg').src = src;
        document.getElementById('imgModal').style.display = 'flex';
    }

    const scanner = new Html5Qrcode("reader");
    function startScanner() {
        document.getElementById('scanner-layer').style.display = 'block';
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            stopScanner();
            const found = products.filter(p => p.code && p.code.trim() === text.trim());
            render(found);
        }).catch(err => console.log(err));
    }

    function stopScanner() {
        scanner.stop().then(() => {
            document.getElementById('scanner-layer').style.display = 'none';
        });
    }

    window.onload = fetchData;
</script>
</body>
</html>
