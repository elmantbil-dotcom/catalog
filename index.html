<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuski Cosmetics - Smart Scanner</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff0f5; margin: 0; padding: 0; text-align: center; }
        .header { background: white; padding: 20px; border-bottom: 4px solid #ff80ab; }
        .logo-text { font-size: 24px; font-weight: bold; color: #d81b60; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Стили сканера */
        #interactive { width: 100%; height: 250px; background: #000; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scan-btn { background: #d81b60; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 18px; margin-bottom: 20px; cursor: pointer; width: 100%; }
        .product-link { background: white; display: block; padding: 15px; margin-bottom: 10px; border-radius: 12px; text-decoration: none; color: #333; text-align: left; border-left: 8px solid #ff80ab; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .title { font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">TUSKI COSMETICS</div>
    <div style="font-size: 12px; color: #888;">MARNEULİ - SMART SCANNER</div>
</div>

<div class="container">
    <button class="scan-btn" onclick="startScanner()">📷 SKAN ET / სკანირება</button>

    <div id="interactive">
        <video id="video"></video>
    </div>

    <div id="productList">
        <p style="color: #888;">Məhsul siyahısı (Список товаров):</p>
        <a href="6911523237986.html" class="product-link"><span class="title">Huda Rosemary Cream</span></a>
        <a href="4585795648539.html" class="product-link" style="border-left-color: #4caf50;"><span class="title">Aloe Vera Gel</span></a>
        <a href="8809576261172.html" class="product-link" style="border-left-color: #2196f3;"><span class="title">Centella Serum</span></a>
    </div>
</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    
    function startScanner() {
        document.getElementById('interactive').style.display = 'block';
        
        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                console.log(result.text);
                // Если код найден, переходим на страницу товара
                window.location.href = result.text + ".html";
            }
        });
    }
</script>

</body>
</html>
