<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuski Cosmetics - Smart Catalog</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff0f5; margin: 0; padding: 0; text-align: center; }
        .header { background: white; padding: 25px; border-bottom: 4px solid #ff80ab; }
        .logo-text { font-size: 26px; font-weight: bold; color: #d81b60; text-transform: uppercase; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Поле поиска */
        .search-container { margin-bottom: 30px; }
        #barcodeInput { 
            width: 80%; 
            padding: 15px; 
            border-radius: 50px; 
            border: 2px solid #ff80ab; 
            font-size: 16px; 
            outline: none; 
            text-align: center;
        }
        .search-btn {
            background: #d81b60; color: white; border: none; padding: 10px 20px; 
            border-radius: 20px; margin-top: 10px; cursor: pointer; font-weight: bold;
        }

        .product-link { 
            background: white; display: block; padding: 20px; margin-bottom: 15px; 
            border-radius: 15px; text-decoration: none; color: #333; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 10px solid #ff80ab;
            text-align: left; transition: 0.3s;
        }
        .title { font-weight: bold; font-size: 18px; display: block; }
        .desc { font-size: 13px; color: #777; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">TUSKI COSMETICS</div>
    <div style="font-size: 12px; color: #888;">MARNEULİ - SMART KATALOQ</div>
</div>

<div class="container">
    <div class="search-container">
        <p style="color: #d81b60; font-weight: bold;">Məhsulu tap (Skan et və ya kodu yaz):</p>
        <input type="text" id="barcodeInput" placeholder="Məsələn: 6911523..." oninput="filterProducts()">
        <br>
        <button class="search-btn" onclick="goToProduct()">Axtar (Axtarış)</button>
    </div>

    <div id="productList">
        <a href="6911523237986.html" class="product-link" data-barcode="6911523237986">
            <span class="title">Huda Rosemary Face Cream</span>
            <span class="desc">Barkod: 6911523237986</span>
        </a>

        <a href="4585795648539.html" class="product-link" data-barcode="4585795648539" style="border-left-color: #4caf50;">
            <span class="title" style="color: #2e7d32;">Aloe Vera Moisturizing Gel</span>
            <span class="desc">Barkod: 4585795648539</span>
        </a>

        <a href="8809576261172.html" class="product-link" data-barcode="8809576261172" style="border-left-color: #2196f3;">
            <span class="title" style="color: #1565c0;">Centella Face Serum</span>
            <span class="desc">Barkod: 8809576261172</span>
        </a>
    </div>
</div>

<script>
    // Функция мгновенного перехода по штрих-коду
    function goToProduct() {
        var code = document.getElementById('barcodeInput').value.trim();
        if(code.length > 5) {
            window.location.href = code + ".html";
        } else {
            alert("Lütfən tam kodu daxil edin (Пожалуйста, введите полный код)");
        }
    }

    // Функция фильтрации списка при наборе
    function filterProducts() {
        var input = document.getElementById('barcodeInput').value.toLowerCase();
        var cards = document.getElementsByClassName('product-link');
        
        for (var i = 0; i < cards.length; i++) {
            var barcode = cards[i].getAttribute('data-barcode');
            var title = cards[i].getElementsByClassName('title')[0].innerText.toLowerCase();
            
            if (barcode.includes(input) || title.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
