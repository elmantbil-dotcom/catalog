<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUSKI COSMETICS - Smart Catalog</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; background: #f8f8f8; text-align: center; color: #222; 
        }

        /* Шапка */
        .header { background: #fff; padding: 25px 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .logo-text { font-size: 26px; font-weight: bold; letter-spacing: 3px; color: #000; margin: 10px 0; }
        .location { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 20px; }

        /* Блок сканера */
        .scanner-box {
            width: 90%; max-width: 400px; margin: 0 auto 20px;
            background: #1a1a1a; border-radius: 20px; min-height: 250px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; border: 3px solid #eee;
        }
        #reader { width: 100%; }
        .start-btn {
            padding: 14px 28px; background: #000; color: #fff; border: 2px solid #fff;
            border-radius: 40px; cursor: pointer; font-weight: bold;
        }
        #result { margin-top: 15px; font-size: 14px; color: #d81b60; font-weight: bold; min-height: 20px; }

        /* Меню категорий */
        .category-menu { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 25px; }
        .filter-btn { 
            padding: 10px 18px; border-radius: 30px; border: 1px solid #ddd; 
            background: #fff; cursor: pointer; font-size: 13px; font-weight: 500;
        }
        .filter-btn.active { background: #000; color: #fff; border-color: #000; }

        /* Сетка товаров */
        .product-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; padding: 15px; max-width: 1200px; margin: 0 auto; 
        }

        /* Карточка товара */
        .product-card { 
            background: #fff; border-radius: 15px; padding: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04); text-align: left; transition: 0.3s;
        }
        .product-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; }
        .p-name { font-weight: bold; margin: 12px 0 5px; font-size: 16px; }
        .p-price { color: #d81b60; font-weight: bold; font-size: 18px; }

        /* Три языка */
        .p-description { font-size: 12px; color: #555; margin-top: 10px; line-height: 1.4; }
        .p-description p { margin: 4px 0; }
        .p-description strong { 
            color: #000; font-size: 10px; background: #eee; 
            padding: 1px 4px; border-radius: 3px; margin-right: 5px; 
        }

        .pro-label { 
            background: #000; color: #fff; font-size: 10px; 
            padding: 4px 8px; border-radius: 5px; margin-top: 8px; display: inline-block;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">TUSKI COSMETICS</div>
        <div class="location">MARNEULI - SMART SCANNER</div>

        <div class="scanner-box">
            <button id="start-camera-btn" class="start-btn">სკანერის ჩართვა (Start Scanner)</button>
            <div id="reader"></div>
        </div>
        <div id="result">სკანერი მზად არის</div>

        <div class="category-menu">
            <button class="filter-btn active" data-filter="all">ყველა (All)</button>
            <button class="filter-btn" data-filter="lipstick">ტუჩსაცხი (Lipstick)</button>
            <button class="filter-btn" data-filter="brush">სავარცხელი (Brush)</button>
            <button class="filter-btn" data-filter="perfume">პარფიუმერია (Perfume)</button>
            <button class="filter-btn" data-filter="salon">სალონი (Salon / PRO)</button>
        </div>
    </div>

    <div class="product-grid" id="product-grid">
        
        <div class="product-card lipstick" id="item-111111">
            <img src="lipstick1.jpg">
            <div class="p-name">Matte Lipstick</div>
            <div class="p-price">18.00 GEL</div>
            <div class="p-description">
                <p><strong>KA:</strong> გლუვი ტუჩსაცხი.</p>
                <p><strong>AZ:</strong> Mat dodaq boyası.</p>
                <p><strong>EN:</strong> Matte lipstick.</p>
            </div>
        </div>

        <div class="product-card salon" id="item-222222">
            <img src="pro_shampoo.jpg">
            <div class="p-name">Pro Shampoo</div>
            <div class="p-price">50.00 GEL</div>
            <div class="pro-label">მხოლოდ სალონებისთვის (Pro Only)</div>
            <div class="p-description">
                <p><strong>KA:</strong> პროფესიონალური შამპუნი.</p>
                <p><strong>AZ:</strong> Peşəkar şampun.</p>
                <p><strong>EN:</strong> Professional shampoo.</p>
            </div>
        </div>

    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const startBtn = document.getElementById('start-camera-btn');
        const resultDiv = document.getElementById('result');

        // Сканирование и поиск
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none'; 
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    const targetId = "item-" + decodedText;
                    const element = document.getElementById(targetId);

                    if (element) {
                        resultDiv.innerText = "პროდუქტი ნაპოვნია! (Found!)";
                        // Показываем всё, чтобы найти скрытый товар
                        document.querySelectorAll('.product-card').forEach(c => c.style.display = 'block');
                        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        element.style.boxShadow = "0 0 20px #d81b60";
                        setTimeout(() => { element.style.boxShadow = "none"; }, 3000);
                    } else {
                        resultDiv.innerText = "კოდი: " + decodedText + " (Not Found)";
                    }
                }
            ).catch(err => {
                startBtn.style.display = 'block'; 
                resultDiv.innerText = "კამერის შეცდომა";
            });
        });

        // Фильтры категорий
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.getAttribute('data-filter');
                document.querySelectorAll('.product-card').forEach(card => {
                    card.style.display = (filter === 'all' || card.classList.contains(filter)) ? 'block' : 'none';
                });
            });
        });
    </script>
</body>
</html>
