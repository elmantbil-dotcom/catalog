<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUSKI COSMETICS - Smart Catalog</title>
    <style>
        :root {
            --main-color: #333;
            --accent-color: #d4a373;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f9f9f9; text-align: center; }
        header { padding: 20px; background: white; border-bottom: 1px solid #ddd; }
        
        /* Кнопки */
        .btn { background: var(--main-color); color: white; border: none; padding: 12px 25px; 
               border-radius: 25px; cursor: pointer; margin: 10px; font-size: 16px; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }

        /* Сетка товаров */
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .product-card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; border-radius: 8px; cursor: zoom-in; transition: 0.3s; }
        .product-card h3 { font-size: 14px; margin: 10px 0 5px; color: #333; }
        .product-card p { font-weight: bold; color: #b02a37; margin: 0; }

        /* Модальное окно для фото (Lightbox) */
        #imgModal { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; 
                    background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #imgModal img { max-width: 90%; max-height: 80%; border-radius: 10px; }

        /* Окно сканера */
        #scanner-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                             background: black; z-index: 9999; }
        #close-scanner { position: absolute; top: 20px; right: 20px; background: #ff4d4d; color: white; 
                         border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; 
                         cursor: pointer; z-index: 10001; }
    </style>
</head>
<body>

<header>
    <h1>TUSKI COSMETICS</h1>
    <p>MARNEULI SMART CATALOG</p>
    <button class="btn" onclick="startScanner()">ჩართე სკანერი (Start Scan)</button>
</header>

<div id="categories">
    <button class="btn" onclick="filterData('All')">ყველა (All)</button>
</div>

<div id="loading">იტვირთება პროდუქცია... (Loading...)</div>

<div id="catalog"></div>

<div id="scanner-container">
    <button id="close-scanner" onclick="stopScanner()">✕</button>
    <div id="reader" style="width: 100%;"></div>
</div>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="fullImg" src="">
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    // СЮДА ВСТАВЬ СВОЮ ССЫЛКУ НА CSV ИЗ GOOGLE SHEETS
    const csvUrl = 'ССЫЛКА_НА_ТВОЙ_CSV_ФАЙЛ_ТУТ'; 

    let allProducts = [];

    // Загрузка данных
    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // Пропускаем заголовок
            
            allProducts = rows.map(row => {
                const cols = row.split(',');
                return { name: cols[0], category: cols[1], price: cols[2], img: cols[3], barcode: cols[4] };
            });

            renderCatalog(allProducts);
            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            console.error("Ошибка загрузки:", error);
            document.getElementById('loading').innerText = "Ошибка загрузки данных.";
        }
    }

    function renderCatalog(products) {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}" onclick="openImg('${p.img}')" alt="${p.name}">
                <h3>${p.name}</h3>
                <p>${p.price} GEL</p>
            </div>
        `).join('');
    }

    // Увеличение фото
    function openImg(src) {
        const modal = document.getElementById('imgModal');
        document.getElementById('fullImg').src = src;
        modal.style.display = 'flex';
    }

    // Сканер
    const html5QrCode = new Html5Qrcode("reader");

    function startScanner() {
        document.getElementById('scanner-container').style.display = 'block';
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
                console.log("Barcode found:", decodedText);
                stopScanner();
                // Логика поиска по штрихкоду
                const found = allProducts.filter(p => p.barcode && p.barcode.trim() === decodedText.trim());
                renderCatalog(found);
            }
        ).catch(err => console.error("Ошибка камеры:", err));
    }

    function stopScanner() {
        html5QrCode.stop().then(() => {
            document.getElementById('scanner-container').style.display = 'none';
        });
    }

    window.onload = loadData;
</script>

</body>
</html>
