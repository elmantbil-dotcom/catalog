<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">

    <title>Tuski Cosmetics - Catalog</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff0f5; margin: 0; padding: 0; text-align: center; }
        .header { background: white; padding: 30px 20px; border-bottom: 4px solid #ff80ab; }
        .logo-text { font-size: 28px; font-weight: bold; color: #d81b60; letter-spacing: 2px; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        
        .product-card { 
            background: white; 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 15px; 
            text-decoration: none; 
            color: #333; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
            border-left: 8px solid #ff80ab;
        }
        .product-card:hover { transform: scale(1.02); }
        .product-info { text-align: left; margin-left: 15px; }
        .product-title { font-weight: bold; color: #c2185b; font-size: 18px; }
        .product-desc { font-size: 13px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">

</div>

<div class="container">

        <div class="product-info">
            <div class="product-title">Huda Rosemary Face Cream</div>

        </div>

    <a href="4585795648539.html" class="product-card" style="border-left-color: #4caf50;">
